<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B1A4A"/>
      <stop offset="50%" style="stop-color:#5C2D82"/>
      <stop offset="100%" style="stop-color:#1A3A8C"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <!-- Robot head (rounded rectangle) -->
  <rect x="50" y="55" width="100" height="85" rx="30" ry="30" fill="url(#bg)" stroke="none"/>
  <!-- Antenna -->
  <line x1="100" y1="45" x2="100" y2="55" stroke="#ddd" stroke-width="4" stroke-linecap="round"/>
  <circle cx="100" cy="40" r="6" fill="#ddd"/>
  <!-- Speech bubble / face area -->
  <rect x="55" y="65" width="90" height="60" rx="22" ry="22" fill="white"/>
  <!-- Speech bubble tail -->
  <polygon points="75,125 85,125 70,140" fill="white"/>
  <!-- Eyes -->
  <circle cx="78" cy="92" r="10" fill="#5C2D82"/>
  <circle cx="122" cy="92" r="10" fill="#5C2D82"/>
  <!-- Eye shine -->
  <circle cx="82" cy="88" r="3" fill="white" opacity="0.6"/>
  <circle cx="126" cy="88" r="3" fill="white" opacity="0.6"/>
  <!-- Ears -->
  <rect x="38" y="78" width="14" height="24" rx="5" ry="5" fill="#ddd" opacity="0.7"/>
  <rect x="148" y="78" width="14" height="24" rx="5" ry="5" fill="#ddd" opacity="0.7"/>
</svg>
